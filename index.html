<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>RADecConvert</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f7fb;
  --card:#ffffff;
  --primary:#3b82f6;
  --text:#1f2937;
  --muted:#6b7280;
  --error:#dc2626;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:"Inter",system-ui,-apple-system;
  background:var(--bg);
  color:var(--text);
}
.container {
  max-width:680px;
  margin:48px auto;
  padding:0 16px;
}
h1 {
  text-align:center;
  font-size:26px;
  margin-bottom:6px;
}
.lang-bar {
  text-align:center;
  margin-bottom:12px;
}
.lang-bar span {
  margin:0 6px;
  cursor:pointer;
  color:var(--primary);
  font-weight:500;
}
.lang-bar span.active {
  text-decoration:underline;
}
.subtitle {
  text-align:center;
  color:var(--muted);
  margin-bottom:20px;
}
.tabs {
  display:flex;
  background:#e5edff;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:24px;
}
.tab {
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
  font-weight:600;
}
.tab.active {
  background:var(--primary);
  color:#fff;
}
.card {
  background:var(--card);
  border-radius:14px;
  padding:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
}
label {
  display:block;
  font-weight:600;
  margin-top:16px;
}
.hint {
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}
.error {
  font-size:12px;
  color:var(--error);
  margin-top:4px;
}
input {
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #d1d5db;
  font-size:15px;
}
button {
  margin-top:22px;
  width:100%;
  padding:12px;
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}
button:hover { opacity:.9; }
.result {
  margin-top:18px;
  padding:14px;
  background:#eff6ff;
  border-radius:10px;
  font-size:15px;
  line-height:1.6;
}
footer {
  text-align:center;
  margin-top:36px;
  font-size:13px;
  color:var(--muted);
}
.hidden { display:none; }
</style>
</head>

<body>
<div class="container">
<h1>RADecConvert</h1>
<div class="lang-bar" id="langBar"></div>
<div class="subtitle" id="subtitle"></div>

<div class="tabs">
  <div class="tab active" id="tab1" onclick="switchTab('eq2gal')"></div>
  <div class="tab" id="tab2" onclick="switchTab('gal2eq')"></div>
</div>

<!-- RA/Dec → l,b -->
<div class="card" id="eq2gal">
  <label id="lblRa"></label>
  <input id="ra" oninput="clearError('errRa')">
  <div class="hint" id="hintRa"></div>
  <div class="error hidden" id="errRa"></div>

  <label id="lblDec"></label>
  <input id="dec" oninput="clearError('errDec')">
  <div class="hint" id="hintDec"></div>
  <div class="error hidden" id="errDec"></div>

  <button id="btnEq2gal" onclick="toGalactic()"></button>
  <div id="r1" class="result hidden"></div>
</div>

<!-- l,b → RA/Dec -->
<div class="card hidden" id="gal2eq">
  <label id="lblL"></label>
  <input id="l" oninput="clearError('errL')">
  <div class="hint" id="hintL"></div>
  <div class="error hidden" id="errL"></div>

  <label id="lblB"></label>
  <input id="b" oninput="clearError('errB')">
  <div class="hint" id="hintB"></div>
  <div class="error hidden" id="errB"></div>

  <button id="btnGal2eq" onclick="toEquatorial()"></button>
  <div id="r2" class="result hidden"></div>
</div>

<footer id="footer"></footer>
</div>

<script>
/* ===== IAU 1984 ===== */
const M = [
  [-0.054875539726,-0.873437108019,-0.483834985808],
  [ 0.494109453312,-0.444829589426, 0.746982251810],
  [-0.867666148981,-0.198076386122, 0.455983795705]
];
const d2r=Math.PI/180, r2d=180/Math.PI;

/* ===== i18n ===== */
const LANG = {
zh:{
  name:"中文",
  subtitle:"赤道坐标 ↔ 银道坐标转换",
  tab1:"赤经赤纬 → 银经银纬", tab2:"银经银纬 → 赤经赤纬",
  ra:"赤经 RA", hintRa:"格式：时:分:秒（例：05:34:31.97）",
  dec:"赤纬 Dec", hintDec:"格式：±度:分:秒（例：+22:00:52.1）",
  l:"银经 l", hintL:"单位：度（0 到 360）",
  b:"银纬 b", hintB:"单位：度（-90 到 +90）",
  btnEq:"转换", btnGal:"转换",
  err:"输入格式不正确",
  resultL:"银经 l", resultB:"银纬 b",
  resultRa:"赤经 RA", resultDec:"赤纬 Dec",
  footer:"J2000 标准"
},
en:{
  name:"English",
  subtitle:"Equatorial ↔ Galactic Coordinate Conversion",
  tab1:"RA/Dec → l/b", tab2:"l/b → RA/Dec",
  ra:"Right Ascension (RA)", hintRa:"Format: h:m:s (e.g. 05:34:31.97)",
  dec:"Declination (Dec)", hintDec:"Format: ±d:m:s (e.g. +22:00:52.1)",
  l:"Galactic Longitude l", hintL:"Unit: degrees (0 to 360)",
  b:"Galactic Latitude b", hintB:"Unit: degrees (-90 to +90)",
  btnEq:"Convert", btnGal:"Convert",
  err:"Invalid input format",
  resultL:"Galactic Longitude l", resultB:"Galactic Latitude b",
  resultRa:"Right Ascension", resultDec:"Declination",
  footer:"J2000 standard"
},
es:{
  name:"Español",
  subtitle:"Conversión entre coordenadas ecuatoriales y galácticas",
  tab1:"RA/Dec → l/b", tab2:"l/b → RA/Dec",
  ra:"Ascensión Recta (RA)", hintRa:"Formato: h:m:s (ej. 05:34:31.97)",
  dec:"Declinación (Dec)", hintDec:"Formato: ±d:m:s (ej. +22:00:52.1)",
  l:"Longitud Galáctica l", hintL:"Unidad: grados (0 a 360)",
  b:"Latitud Galáctica b", hintB:"Unidad: grados (-90 a +90)",
  btnEq:"Convertir", btnGal:"Convertir",
  err:"Formato de entrada incorrecto",
  resultL:"Longitud Galáctica l", resultB:"Latitud Galáctica b",
  resultRa:"Ascensión Recta", resultDec:"Declinación",
  footer:"Estándar J2000"
},
fr:{
  name:"Français",
  subtitle:"Conversion équatorial ↔ galactique",
  tab1:"RA/Dec → l/b", tab2:"l/b → RA/Dec",
  ra:"Ascension Droite (RA)", hintRa:"Format : h:m:s (ex. 05:34:31.97)",
  dec:"Déclinaison (Dec)", hintDec:"Format : ±d:m:s (ex. +22:00:52.1)",
  l:"Longitude Galactique l", hintL:"Unité : degrés (0 à 360)",
  b:"Latitude Galactique b", hintB:"Unité : degrés (-90 à +90)",
  btnEq:"Convertir", btnGal:"Convertir",
  err:"Format d'entrée invalide",
  resultL:"Longitude Galactique l", resultB:"Latitude Galactique b",
  resultRa:"Ascension Droite", resultDec:"Déclinaison",
  footer:"Standard J2000"
},
ja:{
  name:"日本語",
  subtitle:"赤道座標 ↔ 銀河座標 変換ツール",
  tab1:"赤経/赤緯 → 銀経/銀緯",
  tab2:"銀経/銀緯 → 赤経/赤緯",
  ra:"赤経 (RA)", hintRa:"形式：時:分:秒（例：05:34:31.97）",
  dec:"赤緯 (Dec)", hintDec:"形式：±度:分:秒（例：+22:00:52.1）",
  l:"銀経 l", hintL:"単位：度（0 から 360）",
  b:"銀緯 b", hintB:"単位：度（-90 から +90）",
  btnEq:"変換", btnGal:"変換",
  err:"入力形式が正しくありません",
  resultL:"銀経 l", resultB:"銀緯 b",
  resultRa:"赤経", resultDec:"赤緯",
  footer:"J2000 標準"
},
de:{
  name:"Deutsch",
  subtitle:"Äquatoriale ↔ Galaktische Koordinaten",
  tab1:"RA/Dec → l/b", tab2:"l/b → RA/Dec",
  ra:"Rektaszension (RA)", hintRa:"Format: h:m:s (z.B. 05:34:31.97)",
  dec:"Deklination (Dec)", hintDec:"Format: ±d:m:s (z.B. +22:00:52.1)",
  l:"Galaktische Länge l", hintL:"Einheit: Grad (0 bis 360)",
  b:"Galaktische Breite b", hintB:"Einheit: Grad (-90 bis +90)",
  btnEq:"Umrechnen", btnGal:"Umrechnen",
  err:"Ungültiges Eingabeformat",
  resultL:"Galaktische Länge l", resultB:"Galaktische Breite b",
  resultRa:"Rektaszension", resultDec:"Deklination",
  footer:"J2000 Standard"
},
ru:{
  name:"Русский",
  subtitle:"Экваториальные ↔ Галактические координаты",
  tab1:"RA/Dec → l/b", tab2:"l/b → RA/Dec",
  ra:"Прямое восхождение (RA)", hintRa:"Формат: ч:м:с (напр. 05:34:31.97)",
  dec:"Склонение (Dec)", hintDec:"Формат: ±гр:м:с (напр. +22:00:52.1)",
  l:"Галактическая долгота l", hintL:"Единица: градусы (0 до 360)",
  b:"Галактическая широта b", hintB:"Единица: градусы (-90 до +90)",
  btnEq:"Перевести", btnGal:"Перевести",
  err:"Неверный формат ввода",
  resultL:"Галактическая долгота l", resultB:"Галактическая широта b",
  resultRa:"Прямое восхождение", resultDec:"Склонение",
  footer:"Стандарт J2000"
}
};

let lang='zh';
function setLang(l){
  lang=l;
  const t=LANG[l];
  renderLangBar();
  document.getElementById("subtitle").innerText=t.subtitle;
  document.getElementById("tab1").innerText=t.tab1;
  document.getElementById("tab2").innerText=t.tab2;
  document.getElementById("lblRa").innerText=t.ra;
  document.getElementById("hintRa").innerText=t.hintRa;
  document.getElementById("lblDec").innerText=t.dec;
  document.getElementById("hintDec").innerText=t.hintDec;
  document.getElementById("lblL").innerText=t.l;
  document.getElementById("hintL").innerText=t.hintL;
  document.getElementById("lblB").innerText=t.b;
  document.getElementById("hintB").innerText=t.hintB;
  document.getElementById("btnEq2gal").innerText=t.btnEq;
  document.getElementById("btnGal2eq").innerText=t.btnGal;
  document.getElementById("footer").innerText=t.footer;
}
function renderLangBar(){
  const bar=document.getElementById("langBar");
  bar.innerHTML=Object.keys(LANG).map(k=>`
    <span class="${k===lang?'active':''}" onclick="setLang('${k}')">${LANG[k].name}</span>
  `).join('');
}

/* ===== UI ===== */
function switchTab(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id==='eq2gal'?'tab1':'tab2').classList.add('active');
}

/* ===== Validation ===== */
function showError(id,msg){
  const el=document.getElementById(id);
  el.innerText=msg;
  el.classList.remove('hidden');
}
function clearError(id){
  document.getElementById(id).classList.add('hidden');
}
function isValidHMS(v){
  const p=v.trim().split(':');
  if(p.length!==3) return false;
  return p.every(x=>!isNaN(x)&&x!=='');
}
function isValidNumber(v){
  return !isNaN(v) && v!=='';
}

/* ===== Math ===== */
function hmsToDeg(hms){
  const [h,m,s]=hms.split(':').map(Number);
  return (h+m/60+s/3600)*15;
}
function dmsToDeg(dms){
  const s=dms.trim(), neg=s.startsWith('-');
  const [d,m,sec]=s.replace('-','').split(':').map(Number);
  let deg=d+m/60+sec/3600;
  return neg?-deg:deg;
}
function degToHMS(deg){
  deg=(deg%360+360)%360;
  const h=deg/15,hh=Math.floor(h);
  const mm=(h-hh)*60,mi=Math.floor(mm);
  const ss=((mm-mi)*60).toFixed(4);
  return `${hh.toString().padStart(2,'0')}:${mi.toString().padStart(2,'0')}:${ss}`;
}
function degToDMS(deg){
  const n=deg<0;
  deg=Math.abs(deg);
  const d=Math.floor(deg);
  const m=Math.floor((deg-d)*60);
  const s=((deg-d-m/60)*3600).toFixed(3);
  return (n?'-':'+')+`${d}:${m}:${s}`;
}
function eq2gal(ra,de){
  ra*=d2r; de*=d2r;
  const x=Math.cos(de)*Math.cos(ra);
  const y=Math.cos(de)*Math.sin(ra);
  const z=Math.sin(de);
  const gx=M[0][0]*x+M[0][1]*y+M[0][2]*z;
  const gy=M[1][0]*x+M[1][1]*y+M[1][2]*z;
  const gz=M[2][0]*x+M[2][1]*y+M[2][2]*z;
  let l=Math.atan2(gy,gx)*r2d;
  let b=Math.asin(gz)*r2d;
  l=(l%360+360)%360;
  return{l,b};
}
function gal2eq(l,b){
  l*=d2r; b*=d2r;
  const x=Math.cos(b)*Math.cos(l);
  const y=Math.cos(b)*Math.sin(l);
  const z=Math.sin(b);
  const rax=M[0][0]*x+M[1][0]*y+M[2][0]*z;
  const ray=M[0][1]*x+M[1][1]*y+M[2][1]*z;
  const raz=M[0][2]*x+M[1][2]*y+M[2][2]*z;
  let ra=Math.atan2(ray,rax)*r2d;
  let dec=Math.asin(raz)*r2d;
  ra=(ra%360+360)%360;
  return{ra,dec};
}

/* ===== Actions ===== */
function toGalactic(){
  const t=LANG[lang];
  clearError('errRa'); clearError('errDec');
  if(!isValidHMS(ra.value)) return showError('errRa',t.err);
  if(!isValidHMS(dec.value)) return showError('errDec',t.err);

  const r=eq2gal(hmsToDeg(ra.value),dmsToDeg(dec.value));

  const el=r1;
  if(isNaN(r.l)||isNaN(r.b)){
    el.innerText="输出值无意义";
  }else{
    el.innerHTML=`<b>${t.resultL}：</b>${r.l.toFixed(6)}°<br><b>${t.resultB}：</b>${r.b.toFixed(6)}°`;
  }
  el.classList.remove('hidden');
}
function toEquatorial(){
  const t=LANG[lang];
  clearError('errL'); clearError('errB');
  if(!isValidNumber(l.value)) return showError('errL',t.err);
  if(!isValidNumber(b.value)) return showError('errB',t.err);

  const r=gal2eq(+l.value,+b.value);

  const el=r2;
  if(isNaN(r.ra)||isNaN(r.dec)){
    el.innerText="输出值无意义";
  }else{
    el.innerHTML=`<b>${t.resultRa}：</b>${degToHMS(r.ra)}<br><b>${t.resultDec}：</b>${degToDMS(r.dec)}`;
  }
  el.classList.remove('hidden');
}

renderLangBar();
setLang('zh');
</script>
</body>
</html>
